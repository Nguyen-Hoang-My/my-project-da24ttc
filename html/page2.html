<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thiết kế form</title>
    <link rel="stylesheet" href="../css/style2.css">  
</head>
<body>
    <div class="container">
        <form id="frmLogin">
          <h3 class="title">Đăng nhập tài khoản</h3>

          <div class="form-group">
            <label class="label" for="txtUsername">Tên đăng nhập :</label>
            <input class="form-control" type="text" id="txtUsername" name="txtUsername">
          </div> 

          <div class="form-group">
            <label class="label" for="txtPassword">Mật khẩu :</label>
            <input class="form-control" type="password" id="txtPassword" name="txtPassword"> 
          </div>

          <input class="button" type="submit" id="sbLogin" value="Đăng nhập">
        </form>
    </div>       
</body>         
</html>
